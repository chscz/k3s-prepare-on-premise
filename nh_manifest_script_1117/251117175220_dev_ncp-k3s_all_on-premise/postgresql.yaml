apiVersion: v1
kind: Namespace
metadata:
  name: database
---
apiVersion: v1
automountServiceAccountToken: false
kind: ServiceAccount
metadata:
  name: postgresql
  namespace: database
---
apiVersion: v1
data:
  POSTGRES_PASSWORD: ZGpzbHpqYTAwODA=
kind: Secret
metadata:
  name: postgresql-secret
  namespace: database
type: Opaque
---
apiVersion: v1
kind: Service
metadata:
  name: postgresql
  namespace: database
spec:
  ports:
  - port: 5432
    protocol: TCP
    targetPort: tcp-postgresql
  selector:
    app.kubernetes.io/component: primary
    app.kubernetes.io/instance: postgresql
    app.kubernetes.io/name: postgresql
  type: ClusterIP
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  labels:
    app.kubernetes.io/component: primary
    app.kubernetes.io/instance: postgresql
    app.kubernetes.io/name: postgresql
  name: postgresql
  namespace: database
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: primary
      app.kubernetes.io/instance: postgresql
      app.kubernetes.io/name: postgresql
  template:
    metadata:
      labels:
        app.kubernetes.io/component: primary
        app.kubernetes.io/instance: postgresql
        app.kubernetes.io/name: postgresql
    spec:
      containers:
      - env:
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              key: POSTGRES_PASSWORD
              name: postgresql-secret
        - name: POSTGRES_DB
          value: apidb
        image: postgres:17.2-alpine3.21
        imagePullPolicy: IfNotPresent
        name: postgresql
        ports:
        - containerPort: 5432
          name: tcp-postgresql
        resources:
          limits:
            cpu: 2
            memory: 2Gi
          requests:
            cpu: 500m
            memory: 1Gi
        volumeMounts:
        - mountPath: /var/lib/postgresql
          name: data
        - mountPath: /dev/shm
          name: dshm
      serviceAccountName: postgresql
      volumes:
      - emptyDir:
          medium: Memory
        name: dshm
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 2Gi
      storageClassName: openebs-lvmpv
