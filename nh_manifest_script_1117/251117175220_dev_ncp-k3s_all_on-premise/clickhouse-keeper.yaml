apiVersion: v1
kind: Namespace
metadata:
  name: database
---
apiVersion: v1
data:
  keeper_config.xml: |
    <clickhouse replace="true">
        <logger>
            <level>warning</level>
            <log>/var/log/clickhouse-keeper/clickhouse-keeper.log</log>
            <errorlog>/var/log/clickhouse-keeper/clickhouse-keeper.err.log</errorlog>
            <size>1000M</size>
            <count>3</count>
        </logger>
        <listen_host>0.0.0.0</listen_host>
        <keeper_server>
            <tcp_port>9181</tcp_port>
            <server_id>1</server_id>
            <log_storage_path>/var/lib/clickhouse/coordination/log</log_storage_path>
            <snapshot_storage_path>/var/lib/clickhouse/coordination/snapshots</snapshot_storage_path>
            <coordination_settings>
                <raft_logs_level>information</raft_logs_level>
                <session_timeout_ms>30000</session_timeout_ms>
            </coordination_settings>
            <raft_configuration>
                <server>
                    <id from_env="CLICKHOUSE_KEEPER_SERVER_ID" />
                    <hostname from_env="HOSTNAME"/>
                    <port>9234</port>
                </server>
            </raft_configuration>
        </keeper_server>
    </clickhouse>
kind: ConfigMap
metadata:
  name: clickhouse-keeper-config
  namespace: database
---
apiVersion: v1
kind: Service
metadata:
  name: clickhouse-keeper
  namespace: database
spec:
  ports:
  - name: tcp
    port: 9181
    targetPort: tcp
  - name: raft
    port: 9234
    targetPort: raft
  selector:
    app.kubernetes.io/component: keeper
    app.kubernetes.io/instance: clickhouse
    app.kubernetes.io/name: clickhouse
  type: ClusterIP
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  labels:
    app.kubernetes.io/component: keeper
    app.kubernetes.io/instance: clickhouse
    app.kubernetes.io/name: clickhouse
  name: clickhouse-keeper
  namespace: database
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: keeper
      app.kubernetes.io/instance: clickhouse
      app.kubernetes.io/name: clickhouse
  template:
    metadata:
      labels:
        app.kubernetes.io/component: keeper
        app.kubernetes.io/instance: clickhouse
        app.kubernetes.io/name: clickhouse
    spec:
      automountServiceAccountToken: false
      containers:
      - command:
        - /bin/sh
        - -c
        - |
          export CLICKHOUSE_KEEPER_SERVER_ID=$((${HOSTNAME##*-} + 1))
          exec /usr/bin/clickhouse-keeper --config /etc/clickhouse-keeper/keeper_config.xml
        env:
        - name: CLICKHOUSE_KEEPER_TCP_PORT
          value: "9181"
        - name: CLICKHOUSE_KEEPER_RAFT_PORT
          value: "9234"
        image: clickhouse/clickhouse-keeper:24.12.3.47-alpine
        imagePullPolicy: IfNotPresent
        name: keeper
        ports:
        - containerPort: 9181
          name: tcp
        - containerPort: 9234
          name: raft
        resources:
          limits:
            cpu: 1
            memory: 2Gi
          requests:
            cpu: 100m
            memory: 1Gi
        volumeMounts:
        - mountPath: /var/lib/clickhouse
          name: data
        - mountPath: /var/log/clickhouse-keeper
          name: data-log
        - mountPath: /etc/clickhouse-keeper/keeper_config.xml
          name: clickhouse-keeper-config
          subPath: keeper_config.xml
      nodeSelector:
        node-purpose: clickhouse
      volumes:
      - configMap:
          name: clickhouse-keeper-config
        name: clickhouse-keeper-config
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 2Gi
      storageClassName: openebs-lvmpv
  - metadata:
      name: data-log
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 2Gi
      storageClassName: openebs-lvmpv
