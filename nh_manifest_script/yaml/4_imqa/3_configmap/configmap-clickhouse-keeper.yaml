apiVersion: v1
kind: ConfigMap
metadata:
  name: clickhouse-keeper-config
  namespace: database
data:
  keeper_config.xml: |
    <clickhouse replace="true">
      <listen_host>0.0.0.0</listen_host>
      <keeper_server>
        <tcp_port>9181</tcp_port>
        <server_id>1</server_id>
        <log_storage_path>/var/lib/clickhouse-keeper/coordination/log</log_storage_path>
        <snapshot_storage_path>/var/lib/clickhouse-keeper/coordination/snapshots</snapshot_storage_path>
        <coordination_settings>
            <raft_logs_level>information</raft_logs_level>
            <session_timeout_ms>30000</session_timeout_ms>
        </coordination_settings>
        <raft_configuration>
          <server>
            <id from_env="CLICKHOUSE_KEEPER_SERVER_ID" />
            <hostname>clickhouse-keeper.database.svc.cluster.local</hostname>
            <port>9234</port>
          </server>
        </raft_configuration>
      </keeper_server>
      <logger>
        <level>information</level>
        <log>/var/lib/clickhouse-keeper/logs/clickhouse-keeper.log</log>
        <errorlog>/var/lib/clickhouse-keeper/logs/clickhouse-keeper.err.log</errorlog>
        <size>1000M</size>
        <count>3</count>
      </logger>
    </clickhouse>

