apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: collector
spec:
  type: NodePort
  selector:
    app: otel-collector
  ports:
  - name: http
    port: 4318
    protocol: TCP
    targetPort: 4318
    nodePort: 30418
  - name: grpc
    port: 4319
    protocol: TCP
    targetPort: 4319
    nodePort: 30419
    