apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
  name: minio-ingress-route
  namespace: minio
spec:
  entryPoints:
    - websecure # 👈 HTTPS 입구를 명시적으로 추가
  routes:
    - match: Host(`test-nh.imqa.io`) && PathPrefix(`/minio`)
      kind: Rule
      services:
        - name: minio-console
          port: 9001
      middlewares:
        - name: minio-stripprefix
  tls: # 👈 TLS 설정 추가
    secretName: web-tls # 1단계에서 복사한 Secret 이름
---
# Middleware는 변경 없이 그대로 둡니다.
apiVersion: traefik.containo.us/v1alpha1
kind: Middleware
metadata:
  name: minio-stripprefix
  namespace: minio
spec:
  stripPrefix:
    prefixes:
      - /minio
