apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: "local-path"
      resources:
        requests:
          storage: 500Gi        
  template:
    metadata:
      labels:
        app: api
    spec:
      nodeSelector:
        kubernetes.io/hostname: imqa-web
      tolerations:
      - effect: NoSchedule
        key: dedicated
        operator: Equal
        value: api  
      restartPolicy: Always
      containers:
        - name: api
          image: imqav3.azurecr.io/api:1.5.6
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: api-config
            - secretRef:
                name: api-secret
          volumeMounts:
            - mountPath: /app/uploads
              name: data-volume
            - mountPath: /app/config/saml/
              name: config-volume
      volumes:
        - name: data-volume
          emptyDir: {}
      terminationGracePeriodSeconds: 30
