apiVersion: v1
kind: Service
metadata:
  name: clickhouse-keeper
  namespace: database
spec:
  type: ClusterIP
  ports:
  - name: tcp
    port: 9181
    targetPort: tcp
  - name: raft
    port: 9234
    targetPort: raft
  selector:
    app.kubernetes.io/component: keeper
    app.kubernetes.io/instance: clickhouse
    app.kubernetes.io/name: clickhouse
