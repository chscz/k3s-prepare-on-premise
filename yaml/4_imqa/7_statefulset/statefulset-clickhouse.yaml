apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: clickhouse
  namespace: database
  labels:
    app.kubernetes.io/component: clickhouse
    app.kubernetes.io/instance: clickhouse
    app.kubernetes.io/name: clickhouse
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: clickhouse
      app.kubernetes.io/instance: clickhouse
      app.kubernetes.io/name: clickhouse
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: "openebs-lvmpv"
      resources:
        requests:
          storage: 900Gi
  template:
    metadata:
      labels:
        app.kubernetes.io/component: clickhouse
        app.kubernetes.io/instance: clickhouse
        app.kubernetes.io/name: clickhouse
    spec:
      nodeSelector:
        kubernetes.io/hostname: imqa-database
      tolerations:
      - key: "dedicated"
        operator: "Equal"
        value: "database"
        effect: "NoSchedule"
      serviceAccountName: clickhouse
      containers:
        - name: clickhouse
          image: clickhouse/clickhouse-server:24.12.3.47-alpine
          imagePullPolicy: IfNotPresent
          env:
            - name: CLICKHOUSE_DEFAULT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: clickhouse-secret
                  key: CLICKHOUSE_DEFAULT_PASSWORD
            - name: CLICKHOUSE_SHARD_ID
              value: "01"
            - name: CLICKHOUSE_REPLICA_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          ports:
            - name: http
              containerPort: 8123
            - name: tcp
              containerPort: 9000
          resources:
            requests:
              cpu: "16"
              memory: 128Gi
            limits:
              cpu: "32"
              memory: 230Gi
          volumeMounts:
            - name: data
              mountPath: /var/lib/clickhouse
            - name: configd-configuration
              mountPath: /etc/clickhouse-server/config.d
            - name: usersd-configuration
              mountPath: /etc/clickhouse-server/users.d
      volumes:
        - name: configd-configuration
          configMap: { name: clickhouse-configd }
        - name: usersd-configuration
          configMap: { name: clickhouse-usersd }

